name: Learn_workflow
on: 
  push:
    branches: [ "main" ]
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: simple
        run: echo " runnig success............................."
      - name: clone
        uses: actions/checkout@v6.0.2
        # connect to docker hub
      - name: docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: verify docker
        run: docker info

        
      - name: build docker image
        run: docker build -t sree471/learn2:v_${{github.run_number}} .
      - name: show docker images
        run: docker images


        #upload docker image to docker hub
      - name: push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/learn2:v_${{github.run_number }}

      - name: docker logout
        run: docker logout


        # connect to deployment server through ssh
      - name: ssh action
        uses: invi5H/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_U_NAME }}
          key: ${{ secrets.VM_PUBLIC_KEY }}
          
        
