name: Learn_workflow
on: 
  push:
    branches: [ "main" ]
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: simple
        run: echo " runnig success............................."
      - name: clone
        uses: actions/checkout@v6.0.2
        # connect to docker hub
      - name: docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: verify docker
        run: docker info

        
      - name: build docker image
        run: docker build -t sree471/learn2:v_${{github.run_number}} .
      - name: show docker images
        run: docker images


        #upload docker image to docker hub
      - name: push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/learn2:v_${{github.run_number }}

      - name: docker logout
        run: docker logout
      - name: Create PEM file from secret
        run: |
          cat << 'EOF' > key.pem
          ${{ secrets.VM_PRIVATE_KEY }}
          EOF
          chmod 600 key.pem

      - name: connect vm
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "
          echo 'Connected!'
          docker ps
          pwd
          "
          


       
